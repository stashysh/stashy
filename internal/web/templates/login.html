<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stashy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #4285f4; color: #fff; text-decoration: none; border-radius: 4px; font-size: 1rem; }
    .btn:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stashy</h1>
    <p>Object storage gateway</p>
    <a href="/auth/google/login" class="btn">Sign in with Google</a>
  </div>
</body>
</html>
