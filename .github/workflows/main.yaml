name: Main

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: bufbuild/buf-action@v1
      - run: buf generate
      - run: go build ./...
      - run: go vet ./...
