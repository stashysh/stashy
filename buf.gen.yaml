version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.6
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/community/sudorandom-connect-openapi:v0.25.2
    out: public
    opt:
      - only-googleapi-http
      - short-operation-ids
      - trim-unused-types
      - with-proto-names
      - without-default-tags
      - path=openapi.yaml
