syntax = "proto3";

package stashy.v1alpha1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/httpbody.proto";

option go_package = "github.com/stashysh/stashy/gen/stashy/v1alpha1;stashyv1alpha1";

service StorageService {
  // Upload a file to storage.
  rpc CreateFile(stream CreateFileRequest) returns (CreateFileResponse) {
    option (google.api.http) = {
      post: "/v1/files"
      body: "file"
    };
    option (gnostic.openapi.v3.operation) = {
      request_body: {
        request_body: {
          content: {
            additional_properties: {
              name: "*/*"
              value: {
                schema: {
                  schema: {
                    type: "string"
                    format: "binary"
                  }
                }
              }
            }
          }
        }
      }
    };
  }

  // Download a file from storage.
  rpc GetFile(GetFileRequest) returns (stream GetFileResponse) {
    option (google.api.http) = {
      get: "/v1/files/{id}"
      response_body: "file"
    };
    option (gnostic.openapi.v3.operation) = {
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "File content"
              content: {
                additional_properties: {
                  name: "*/*"
                  value: {
                    schema: {
                      schema: {
                        type: "string"
                        format: "binary"
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    };
  }

  // Replace the content of an existing file. Only the owner can update.
  rpc ReplaceFile(stream ReplaceFileRequest) returns (ReplaceFileResponse) {
    option (google.api.http) = {
      put: "/v1/files/{id}"
      body: "file"
    };
    option (gnostic.openapi.v3.operation) = {
      request_body: {
        request_body: {
          content: {
            additional_properties: {
              name: "*/*"
              value: {
                schema: {
                  schema: {
                    type: "string"
                    format: "binary"
                  }
                }
              }
            }
          }
        }
      }
    };
  }

  // Update a file. Only the owner can update. Fields are optional: an absent
  // field is left unchanged, an empty value clears it.
  rpc UpdateFile(UpdateFileRequest) returns (UpdateFileResponse) {
    option (google.api.http) = {
      patch: "/v1/files/{id}"
      body: "*"
    };
  }

  // Make a file publicly accessible.
  rpc PublishFile(PublishFileRequest) returns (PublishFileResponse) {
    option (google.api.http) = {
      post: "/v1/files/{id}/publish"
      body: "*"
    };
  }

  // Remove public access from a file.
  rpc UnpublishFile(UnpublishFileRequest) returns (UnpublishFileResponse) {
    option (google.api.http) = {
      post: "/v1/files/{id}/unpublish"
      body: "*"
    };
  }

  // Delete a file. Only the owner can delete.
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse) {
    option (google.api.http) = {delete: "/v1/files/{id}"};
  }
}

message CreateFileRequest {
  google.api.HttpBody file = 1 [(buf.validate.field).required = true];
}

message CreateFileResponse {
  string id = 1 [(buf.validate.field).required = true];
  string url = 2 [(buf.validate.field) = {
    required: true
    string: {uri: true}
  }];
}

message GetFileRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message GetFileResponse {
  google.api.HttpBody file = 1 [(buf.validate.field).required = true];
}

message ReplaceFileRequest {
  string id = 1 [(buf.validate.field).required = true];
  google.api.HttpBody file = 2 [(buf.validate.field).required = true];
}

message ReplaceFileResponse {}

message UpdateFileRequest {
  string id = 1 [(buf.validate.field).required = true];
  // Human-readable slug used in the file's canonical URL (/{id}/{slug}).
  // An empty string clears it.
  optional string slug = 2 [(buf.validate.field).string = {
    pattern: "^[A-Za-z0-9._~-]*$"
    max_len: 128
  }];
}

message UpdateFileResponse {
  // Canonical URL of the file after the update.
  string url = 1 [(buf.validate.field) = {string: {uri: true}}];
}

message DeleteFileRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message DeleteFileResponse {}

message PublishFileRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message PublishFileResponse {}

message UnpublishFileRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message UnpublishFileResponse {}
